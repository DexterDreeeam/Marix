name: git-sync
description: Pull rebase from remote, resolve conflicts, commit all changes with a concise English message (≤20 words), and push to remote.
run: |
  set -e
  BRANCH=$(git rev-parse --abbrev-ref HEAD)

  # Pull rebase
  git pull --rebase origin "$BRANCH" || {
    echo "Rebase conflict detected — resolve and continue, or abort."
    exit 1
  }

  # Stage and commit if there are changes
  if [ -n "$(git status --porcelain)" ]; then
    git add -A
    git commit  # Copilot will write the message
  else
    echo "No local changes to commit."
  fi

  # Push
  git push origin "$BRANCH"
  echo "Synced branch '$BRANCH' with remote."
