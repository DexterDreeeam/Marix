[runtime]
environment = "development"
mode = "network"

[client]
core_address = "{{ubuntu_ip}}:{{ubuntu_core_port}}"
interactive = true
request_timeout_ms = 30000

[agent]
enabled = true
bind_address = "0.0.0.0:{{ubuntu_core_port}}"
max_turns = 32

[model]
backend = "deepseek"

[model.deepseek]
endpoint = "https://api.deepseek.com/chat/completions"
model = "deepseek-chat"
api_key = { name = "DEEPSEEK_API_KEY" }

[logging]
directory = "logs"
level = "info"
enable_log_info = false
enable_log_warning = false
enable_log_error = false

[credential]
directory = ".credential"
