<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marix Telemetry</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #161a21;
    --panel-alt: #1c212b;
    --border: #262c37;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #4d8dff;
    --info: #4d8dff;
    --warning: #e0a83e;
    --error: #e5484d;
    --debug: #8b93a3;
    --source-host: #d2a8ff;
    --source-client: #56d4dd;
    --source-server: #7ee787;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 14px;
  }
  #app {
    display: flex;
    flex-direction: row;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }
  #sessions {
    position: relative;
    z-index: 1;
    flex: 0 0 16px;
    width: 16px;
    min-width: 0;
    border-right: 1px solid var(--accent);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: visible;
    transition: width 140ms ease-out, flex-basis 140ms ease-out;
  }
  #sessions::after {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 36px;
    background: transparent;
  }
  #sessions:hover, #sessions:focus-within {
    flex-basis: 216px;
    width: 216px;
  }
  #sessions:hover::after, #sessions:focus-within::after {
    pointer-events: none;
  }
  #session-content {
    display: flex;
    width: 100%;
    min-width: 0;
    min-height: 0;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  #sessions h1 {
    width: 216px;
    font-size: 15px;
    margin: 0;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-weight: 600;
  }
  #sessions h1, #session-list {
    opacity: 0;
    pointer-events: none;
    transition: opacity 90ms ease;
  }
  #sessions:hover h1, #sessions:hover #session-list,
  #sessions:focus-within h1, #sessions:focus-within #session-list {
    opacity: 1;
    pointer-events: auto;
    transition-delay: 35ms;
  }
  #session-list {
    width: 216px;
    list-style: none;
    margin: 0;
    padding: 6px;
    overflow-y: auto;
    flex: 1;
  }
  #session-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    margin-bottom: 2px;
  }
  #session-list li:hover {
    background: var(--panel-alt);
    color: var(--text);
  }
  #session-list li:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  #session-list li.selected {
    background: var(--accent);
    color: #fff;
  }
  #session-list .session-label {
    white-space: nowrap;
  }
  #main {
    flex: 1 1 auto;
    width: auto;
    margin-left: 0;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
  }
  #toolbar select, #toolbar input {
    background: var(--panel-alt);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
  }
  #toolbar input[type="text"] {
    flex: 1;
    min-width: 160px;
  }
  #status-banner {
    padding: 8px 16px;
    font-size: 13px;
    display: none;
  }
  #status-banner.error {
    display: block;
    background: rgba(229, 72, 77, 0.15);
    color: var(--error);
    border-bottom: 1px solid var(--border);
  }
  #log-area {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 0 16px 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--bg);
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  thead th:nth-child(-n+3),
  tbody td:nth-child(-n+3) {
    width: 1%;
    padding-left: 7px;
    padding-right: 7px;
    white-space: nowrap;
  }
  thead th:nth-child(2),
  tbody td:nth-child(2) {
    text-align: center;
  }
  td.message-cell {
    white-space: pre-wrap;
    word-break: break-word;
  }
  #log-context-menu {
    position: fixed;
    z-index: 300;
    min-width: 168px;
    max-width: calc(100vw - 16px);
    padding: 5px;
    border: 1px solid rgba(230, 233, 239, 0.18);
    border-radius: 7px;
    background: var(--panel-alt);
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
  }
  #log-context-menu[hidden],
  #format-message-backdrop[hidden] {
    display: none;
  }
  #log-context-menu button {
    width: 100%;
    border: 0;
    border-radius: 5px;
    padding: 8px 10px;
    background: transparent;
    color: var(--text);
    font: inherit;
    text-align: left;
    cursor: pointer;
  }
  #log-context-menu button:hover,
  #log-context-menu button:focus-visible {
    background: rgba(77, 141, 255, 0.18);
    outline: none;
  }
  body.modal-open {
    overflow: hidden;
  }
  #format-message-backdrop {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: flex;
    min-width: 0;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 24px;
    background: rgba(4, 6, 10, 0.76);
    animation: modal-backdrop-in 140ms ease-out;
  }
  #format-message-modal {
    display: flex;
    width: min(1000px, 100%);
    min-width: 0;
    max-width: 100%;
    max-height: 85vh;
    flex-direction: column;
    overflow-x: hidden;
    overflow-y: hidden;
    border: 1px solid rgba(230, 233, 239, 0.2);
    border-radius: 10px;
    background: var(--panel);
    box-shadow: 0 24px 72px rgba(0, 0, 0, 0.58);
    animation: modal-window-in 140ms ease-out;
  }
  #format-message-header {
    display: flex;
    min-width: 0;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
  }
  #format-message-title {
    min-width: 0;
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    overflow-wrap: anywhere;
  }
  #format-message-close {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    background: var(--panel-alt);
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }
  #format-message-close:hover,
  #format-message-close:focus-visible {
    border-color: var(--accent);
    outline: 2px solid rgba(77, 141, 255, 0.35);
    outline-offset: 1px;
  }
  #format-message-editor {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    min-height: 180px;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 18px;
    background: #0c0f14;
    color: var(--text);
    font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  #format-message-editor:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -3px;
  }
  .formatted-text {
    max-width: 100%;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .formatted-json {
    box-sizing: border-box;
    width: 100%;
    min-width: 0;
    max-width: 100%;
    margin: 12px 0;
    overflow-x: hidden;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #111722;
    color: var(--text);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .json-code, .json-line {
    min-width: 0;
    max-width: 100%;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .nested-json {
    width: auto;
    margin: 6px 0 6px clamp(6px, 1.2vw, 12px);
    padding: 10px 10px 10px 12px;
    border-width: 0 0 0 2px;
    border-radius: 0 6px 6px 0;
    background: #0e1420;
  }
  .nested-json.nested-depth-even {
    background: #101827;
  }
  .json-key { color: #8ab4ff; }
  .json-string { color: #7ee787; }
  .json-number { color: #f2a65a; }
  .json-boolean, .json-null { color: #d2a8ff; }
  @keyframes modal-backdrop-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes modal-window-in {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  #copy-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    z-index: 100;
    padding: 10px 16px;
    border: 1px solid rgba(230, 233, 239, 0.24);
    border-radius: 8px;
    background: rgba(230, 233, 239, 0.15);
    color: var(--text);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.96);
    transition: opacity 160ms ease, transform 160ms ease;
  }
  #copy-toast.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  td.time-cell {
    white-space: nowrap;
    color: var(--muted);
  }
  .source-badge {
    display: inline-flex;
    width: 24px;
    height: 24px;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    color: #0f1115;
  }
  .source-host { background: var(--source-host); }
  .source-client { background: var(--source-client); }
  .source-server { background: var(--source-server); }
  .tag-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #0f1115;
  }
  .tag-info { background: var(--info); color: #04122d; }
  .tag-warning { background: var(--warning); color: #2a1c00; }
  .tag-error { background: var(--error); color: #2b0505; }
  .tag-debug { background: var(--debug); color: #0f1115; }
  #empty-state, #initial-loading, #no-sessions-state {
    padding: 24px 4px;
    color: var(--muted);
  }
  @media (max-width: 720px) {
    #app { flex-direction: column; }
    #sessions {
      flex: 0 0 auto;
      width: 100%;
      min-width: 0;
      max-width: none;
      max-height: 30vh;
      border-right: none;
      border-bottom: 1px solid var(--border);
      transition: none;
    }
    #sessions:hover, #sessions:focus-within {
      flex-basis: auto;
      width: 100%;
    }
    #sessions::after {
      display: none;
    }
    #sessions h1, #session-list {
      width: 100%;
      opacity: 1;
      pointer-events: auto;
      transition: none;
    }
    #main {
      width: 100%;
      margin-left: 0;
    }
    #format-message-backdrop {
      padding: 12px;
    }
    #format-message-modal {
      max-height: 92vh;
    }
    .nested-json {
      margin-left: 6px;
      padding: 8px 8px 8px 7px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #sessions, #sessions h1, #session-list, #copy-toast,
    #format-message-backdrop, #format-message-modal {
      transition: none;
      animation: none;
    }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sessions">
    <div id="session-content">
      <h1>Sessions</h1>
      <ul id="session-list"></ul>
    </div>
  </aside>
  <main id="main">
    <div id="toolbar">
      <select id="tag-filter">
        <option value="">All tags</option>
        <option value="Info">Info</option>
        <option value="Warning">Warning</option>
        <option value="Error">Error</option>
        <option value="Debug">Debug</option>
      </select>
      <input id="keyword-filter" type="text" placeholder="Filter by keyword…" />
    </div>
    <div id="status-banner"></div>
    <div id="log-area">
      <div id="initial-loading">Loading…</div>
      <table id="log-table" style="display: none;">
        <thead>
          <tr>
            <th>Emit</th>
            <th>Source</th>
            <th>Tag</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <div id="empty-state" style="display: none;">No log entries match the current filters.</div>
      <div id="no-sessions-state" style="display: none;">No sessions available.</div>
    </div>
  </main>
</div>
<div id="log-context-menu" role="menu" hidden>
  <button id="copy-message-action" type="button" role="menuitem">Copy</button>
  <button id="format-message-action" type="button" role="menuitem">Format message</button>
</div>
<div id="format-message-backdrop" aria-hidden="true" hidden>
  <section
    id="format-message-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="format-message-title"
  >
    <header id="format-message-header">
      <h2 id="format-message-title">Format message</h2>
      <button id="format-message-close" type="button">Close</button>
    </header>
    <div
      id="format-message-editor"
      role="region"
      aria-label="Formatted log message"
      tabindex="0"
    ></div>
  </section>
</div>
<div id="copy-toast" role="status" aria-live="polite">Content Copied</div>
<script>
(function () {
  "use strict";

  var state = {
    sessions: [],
    selectedSession: undefined, // undefined = not chosen yet
    tag: "",
    keyword: "",
    loadToken: 0,
    sessionItems: new Map(),
    logRows: new Map(),
    contextMenu: null,
    modalOpen: false,
    modalPreviousFocus: null,
  };

  var appEl = document.getElementById("app");
  var sessionListEl = document.getElementById("session-list");
  var tagFilterEl = document.getElementById("tag-filter");
  var keywordFilterEl = document.getElementById("keyword-filter");
  var statusBannerEl = document.getElementById("status-banner");
  var logTableEl = document.getElementById("log-table");
  var logBodyEl = document.getElementById("log-body");
  var emptyStateEl = document.getElementById("empty-state");
  var initialLoadingEl = document.getElementById("initial-loading");
  var noSessionsEl = document.getElementById("no-sessions-state");
  var copyToastEl = document.getElementById("copy-toast");
  var contextMenuEl = document.getElementById("log-context-menu");
  var copyMessageActionEl = document.getElementById("copy-message-action");
  var formatMessageActionEl = document.getElementById("format-message-action");
  var modalBackdropEl = document.getElementById("format-message-backdrop");
  var modalEl = document.getElementById("format-message-modal");
  var modalCloseEl = document.getElementById("format-message-close");
  var modalEditorEl = document.getElementById("format-message-editor");
  var copyToastTimer = null;

  // Exactly one of these is ever visible at a time: "loading" only until the
  // first sessions/logs response lands, "no-sessions" when there is no
  // session to show logs for, "empty" when a session has zero matching log
  // entries, and "table" when there are rows to render.
  function setLogAreaState(mode) {
    initialLoadingEl.style.display = mode === "loading" ? "block" : "none";
    noSessionsEl.style.display = mode === "no-sessions" ? "block" : "none";
    emptyStateEl.style.display = mode === "empty" ? "block" : "none";
    logTableEl.style.display = mode === "table" ? "table" : "none";
  }

  function showError(message) {
    statusBannerEl.textContent = message;
    statusBannerEl.className = "error";
  }

  function clearError() {
    statusBannerEl.textContent = "";
    statusBannerEl.className = "";
  }

  function sessionKey(sessionId) {
    return sessionId === null ? "unknown" : sessionId;
  }

  function fallbackSessionId(sessions) {
    var ordinary = sessions.find(function (session) {
      return session.id !== null;
    });
    return (ordinary || sessions[0]).id;
  }

  function fetchJSON(url) {
    return fetch(url, { headers: { Accept: "application/json" } }).then(function (response) {
      return response.text().then(function (text) {
        var payload = null;
        try {
          payload = text ? JSON.parse(text) : null;
        } catch (parseError) {
          payload = null;
        }
        if (!response.ok) {
          var message =
            (payload && payload.error) || "request failed (" + response.status + ")";
          var error = new Error(message);
          error.status = response.status;
          throw error;
        }
        return payload;
      });
    });
  }

  function createSessionItem(session) {
    var item = document.createElement("li");
    item.tabIndex = 0;
    item.setAttribute("role", "button");

    var label = document.createElement("span");
    label.className = "session-label";
    item.appendChild(label);

    item.addEventListener("click", function () {
      selectSession(session.id);
    });
    item.addEventListener("keydown", function (event) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        selectSession(session.id);
      }
    });
    return item;
  }

  function renderSessions() {
    var nextItems = new Map();
    state.sessions.forEach(function (session) {
      var key = sessionKey(session.id);
      var item = state.sessionItems.get(key);
      if (!item) {
        item = createSessionItem(session);
      }

      item.classList.toggle(
        "selected",
        key === sessionKey(state.selectedSession)
      );
      var label = item.querySelector(".session-label");
      var labelText =
        session.id === null ? "Unknown" : formatTimestamp(session.emit_ts);
      if (label.textContent !== labelText) {
        label.textContent = labelText;
        item.title = labelText;
      }
      nextItems.set(key, item);
    });

    Array.from(nextItems.values()).forEach(function (item, index) {
      var currentItem = sessionListEl.children[index] || null;
      if (currentItem !== item) {
        sessionListEl.insertBefore(item, currentItem);
      }
    });
    state.sessionItems.forEach(function (item, key) {
      if (!nextItems.has(key)) {
        item.remove();
      }
    });
    state.sessionItems = nextItems;
  }

  function selectSession(sessionId) {
    if (state.modalOpen) {
      return;
    }
    var key = sessionKey(sessionId);
    if (state.selectedSession !== undefined && sessionKey(state.selectedSession) === key) {
      return;
    }
    state.selectedSession = sessionId;
    renderSessions();
    loadLogs();
  }

  function loadSessions() {
    return fetchJSON("/api/sessions").then(function (sessions) {
      if (state.modalOpen) {
        return false;
      }
      state.sessions = sessions || [];
      if (state.sessions.length === 0) {
        state.selectedSession = undefined;
        renderSessions();
        renderLogs([]);
        setLogAreaState("no-sessions");
        return false;
      }
      if (state.selectedSession === undefined) {
        state.selectedSession = fallbackSessionId(state.sessions);
        renderSessions();
        return true;
      }
      var stillPresent = state.sessions.some(function (session) {
        return sessionKey(session.id) === sessionKey(state.selectedSession);
      });
      if (!stillPresent) {
        state.selectedSession = fallbackSessionId(state.sessions);
        renderSessions();
        return true;
      }
      renderSessions();
      return false;
    });
  }

  function tagBadgeClass(tag) {
    switch (tag) {
      case "Info":
        return "tag-info";
      case "Warning":
        return "tag-warning";
      case "Error":
        return "tag-error";
      case "Debug":
        return "tag-debug";
      default:
        return "tag-debug";
    }
  }

  function normalizedSource(source) {
    switch (source) {
      case "Host":
      case "Client":
      case "Server":
        return source;
      default:
        return "Server";
    }
  }

  function sourceBadgeClass(source) {
    return "source-" + source.toLowerCase();
  }

  function sourceInitial(source) {
    return source.charAt(0);
  }

  function formatTimestamp(ms) {
    if (ms === null || ms === undefined) {
      return "–";
    }
    var date = new Date(ms);
    if (isNaN(date.getTime())) {
      return String(ms);
    }
    return date.toLocaleString();
  }

  function showCopyToast() {
    if (copyToastTimer !== null) {
      clearTimeout(copyToastTimer);
    }
    copyToastEl.classList.add("visible");
    copyToastTimer = setTimeout(function () {
      copyToastEl.classList.remove("visible");
      copyToastTimer = null;
    }, 1050);
  }

  function copyTextWithExecCommand(message) {
    var previousFocus = document.activeElement;
    var textarea = document.createElement("textarea");
    textarea.value = message;
    textarea.readOnly = true;
    textarea.style.position = "fixed";
    textarea.style.left = "-9999px";
    textarea.style.top = "0";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);

    try {
      textarea.select();
      textarea.setSelectionRange(0, textarea.value.length);
      return document.execCommand("copy") === true;
    } catch (error) {
      return false;
    } finally {
      textarea.remove();
      if (previousFocus && typeof previousFocus.focus === "function") {
        try {
          previousFocus.focus({ preventScroll: true });
        } catch (focusError) {
          try {
            previousFocus.focus();
          } catch (fallbackFocusError) {
            // Focus restoration is best-effort and must not change copy success.
          }
        }
      }
    }
  }

  function writeClipboardText(message) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
      try {
        return Promise.resolve(navigator.clipboard.writeText(message)).then(
          function () {
            return true;
          },
          function () {
            return copyTextWithExecCommand(message);
          }
        );
      } catch (error) {
        return Promise.resolve(copyTextWithExecCommand(message));
      }
    }
    return Promise.resolve(copyTextWithExecCommand(message));
  }

  function copyMessage(message) {
    writeClipboardText(message).then(
      function (copied) {
        if (copied) {
          showCopyToast();
          return;
        }
        showError("Failed to copy message.");
      },
      function () {
        showError("Failed to copy message.");
      }
    );
  }

  function stableLogField(value) {
    if (value === null) {
      return "null";
    }
    return typeof value + ":" + String(JSON.stringify(value));
  }

  function logSignature(entry) {
    return JSON.stringify([
      stableLogField(entry.session_id),
      stableLogField(entry.session),
      stableLogField(entry.source),
      stableLogField(entry.tag),
      stableLogField(entry.message),
      stableLogField(entry.emit_ts),
      stableLogField(entry.arrival_ts),
    ]);
  }

  function logKey(entry, occurrences) {
    var signature = logSignature(entry);
    var occurrence = occurrences.get(signature) || 0;
    occurrences.set(signature, occurrence + 1);
    return signature + "#" + occurrence;
  }

  function closeContextMenu(restoreFocus) {
    if (!state.contextMenu) {
      return;
    }
    var previousFocus = state.contextMenu.previousFocus;
    state.contextMenu = null;
    contextMenuEl.hidden = true;
    contextMenuEl.style.left = "";
    contextMenuEl.style.top = "";
    if (restoreFocus && previousFocus && previousFocus.isConnected) {
      previousFocus.focus({ preventScroll: true });
    }
  }

  function openContextMenu(event, key, row, message) {
    event.preventDefault();
    if (state.modalOpen) {
      return;
    }

    closeContextMenu(false);
    state.contextMenu = {
      key: key,
      row: row,
      message: message,
      previousFocus: document.activeElement,
    };
    contextMenuEl.hidden = false;
    contextMenuEl.style.visibility = "hidden";
    contextMenuEl.style.left = "0";
    contextMenuEl.style.top = "0";

    var bounds = contextMenuEl.getBoundingClientRect();
    var margin = 8;
    var left = Math.max(
      margin,
      Math.min(event.clientX, window.innerWidth - bounds.width - margin)
    );
    var top = Math.max(
      margin,
      Math.min(event.clientY, window.innerHeight - bounds.height - margin)
    );
    contextMenuEl.style.left = left + "px";
    contextMenuEl.style.top = top + "px";
    contextMenuEl.style.visibility = "";
    copyMessageActionEl.focus({ preventScroll: true });
  }

  function countPrecedingBackslashes(text, index) {
    var count = 0;
    for (var cursor = index - 1; cursor >= 0 && text[cursor] === "\\"; cursor -= 1) {
      count += 1;
    }
    return count;
  }

  function findBalancedJsonCandidate(message, start) {
    var opening = message[start];
    var expectedClose = opening === "{" ? "}" : opening === "[" ? "]" : null;
    if (!expectedClose) {
      return null;
    }

    var stack = [expectedClose];
    var stringMode = null;
    var inString = false;
    for (var index = start + 1; index < message.length; index += 1) {
      var character = message[index];
      if (character === "\"") {
        var slashCount = countPrecedingBackslashes(message, index);
        if (stringMode === null) {
          stringMode = slashCount % 2 === 1 ? "escaped" : "direct";
          inString = true;
        } else if (stringMode === "direct" && slashCount % 2 === 0) {
          inString = !inString;
        } else if (stringMode === "escaped" && slashCount % 4 === 1) {
          inString = !inString;
        }
        continue;
      }
      if (inString) {
        continue;
      }
      if (character === "{" || character === "[") {
        stack.push(character === "{" ? "}" : "]");
        continue;
      }
      if (character !== "}" && character !== "]") {
        continue;
      }
      if (stack[stack.length - 1] !== character) {
        return {
          candidate: message.slice(start, index + 1),
          end: index,
        };
      }
      stack.pop();
      if (stack.length === 0) {
        return {
          candidate: message.slice(start, index + 1),
          end: index,
        };
      }
    }
    return null;
  }

  function isJsonContainer(value) {
    return value !== null && typeof value === "object";
  }

  var c_maxNestedJsonDepth = 32;

  function decodeEscapedJsonBody(value) {
    var _body = "";
    for (var _index = 0; _index < value.length; _index += 1) {
      var _character = value[_index];
      if (
        _character === "\"" &&
        countPrecedingBackslashes(value, _index) % 2 === 0
      ) {
        _body += "\\\"";
      } else if (_character.charCodeAt(0) < 0x20) {
        _body += JSON.stringify(_character).slice(1, -1);
      } else {
        _body += _character;
      }
    }

    try {
      return JSON.parse("\"" + _body + "\"");
    } catch (_decodeError) {
      return null;
    }
  }

  function parseNestedJsonString(value) {
    if (typeof value !== "string") {
      return null;
    }

    var _current = value;
    for (var _depth = 0; _depth < c_maxNestedJsonDepth; _depth += 1) {
      var _candidate = _current.trim();
      if (_candidate.length === 0) {
        return null;
      }

      var _parsed;
      try {
        _parsed = JSON.parse(_candidate);
      } catch (_parseError) {
        _parsed = decodeEscapedJsonBody(_candidate);
        if (_parsed === null) {
          return null;
        }
      }

      if (isJsonContainer(_parsed)) {
        return _parsed;
      }
      if (typeof _parsed !== "string" || _parsed === _candidate) {
        return null;
      }
      _current = _parsed;
    }
    return null;
  }

  function parseJsonCandidate(candidate) {
    return parseNestedJsonString(candidate);
  }

  function extractFormattedSegments(message) {
    var segments = [];
    var textStart = 0;
    var searchStart = 0;
    while (searchStart < message.length) {
      var objectStart = message.indexOf("{", searchStart);
      var arrayStart = message.indexOf("[", searchStart);
      var candidateStart;
      if (objectStart === -1) {
        candidateStart = arrayStart;
      } else if (arrayStart === -1) {
        candidateStart = objectStart;
      } else {
        candidateStart = Math.min(objectStart, arrayStart);
      }
      if (candidateStart === -1) {
        break;
      }

      var balanced = findBalancedJsonCandidate(message, candidateStart);
      if (!balanced) {
        searchStart = candidateStart + 1;
        continue;
      }
      var value = parseJsonCandidate(balanced.candidate);
      if (!value) {
        searchStart = candidateStart + 1;
        continue;
      }
      if (candidateStart > textStart) {
        segments.push({
          kind: "text",
          text: message.slice(textStart, candidateStart),
        });
      }
      segments.push({ kind: "json", value: value });
      textStart = balanced.end + 1;
      searchStart = balanced.end + 1;
    }
    if (textStart < message.length || segments.length === 0) {
      segments.push({ kind: "text", text: message.slice(textStart) });
    }
    return segments;
  }

  function appendJsonToken(container, text, className) {
    var _token = document.createElement("span");
    _token.className = className;
    _token.textContent = text;
    container.appendChild(_token);
  }

  function appendJsonLine(container, indent) {
    var _line = document.createElement("div");
    _line.className = "json-line";
    _line.appendChild(document.createTextNode("  ".repeat(indent)));
    container.appendChild(_line);
    return _line;
  }

  function appendJsonScalar(container, value) {
    var _className;
    if (typeof value === "string") {
      _className = "json-string";
    } else if (typeof value === "number") {
      _className = "json-number";
    } else if (typeof value === "boolean") {
      _className = "json-boolean";
    } else {
      _className = "json-null";
    }
    appendJsonToken(container, JSON.stringify(value), _className);
  }

  function appendJsonPrefix(container, key) {
    if (key === null) {
      return;
    }
    appendJsonToken(container, JSON.stringify(key), "json-key");
    container.appendChild(document.createTextNode(": "));
  }

  function appendJsonValue(
    container,
    value,
    indent,
    key,
    trailingComma,
    sectionDepth
  ) {
    var _nestedValue =
      typeof value === "string" && sectionDepth < c_maxNestedJsonDepth
        ? parseNestedJsonString(value)
        : null;
    if (_nestedValue) {
      if (key !== null) {
        var _keyLine = appendJsonLine(container, indent);
        appendJsonPrefix(_keyLine, key);
      }
      container.appendChild(
        createJsonSection(_nestedValue, sectionDepth + 1, trailingComma)
      );
      return;
    }

    var _line = appendJsonLine(container, indent);
    appendJsonPrefix(_line, key);
    if (!isJsonContainer(value)) {
      appendJsonScalar(_line, value);
      if (trailingComma) {
        _line.appendChild(document.createTextNode(","));
      }
      return;
    }

    var _isArray = Array.isArray(value);
    _line.appendChild(document.createTextNode(_isArray ? "[" : "{"));
    var _entries = _isArray
      ? value.map(function (_item) {
          return [null, _item];
        })
      : Object.keys(value).map(function (_key) {
          return [_key, value[_key]];
        });
    _entries.forEach(function (_entry, _index) {
      appendJsonValue(
        container,
        _entry[1],
        indent + 1,
        _entry[0],
        _index < _entries.length - 1,
        sectionDepth
      );
    });
    var _closingLine = appendJsonLine(container, indent);
    _closingLine.appendChild(document.createTextNode(_isArray ? "]" : "}"));
    if (trailingComma) {
      _closingLine.appendChild(document.createTextNode(","));
    }
  }

  function createJsonSection(value, depth, trailingComma) {
    var _section = document.createElement("div");
    _section.className = "formatted-json";
    _section.dataset.jsonDepth = String(depth);
    if (depth > 0) {
      _section.classList.add("nested-json");
      _section.classList.add(
        depth % 2 === 0 ? "nested-depth-even" : "nested-depth-odd"
      );
    }

    var _code = document.createElement("div");
    _code.className = "json-code";
    appendJsonValue(_code, value, 0, null, trailingComma, depth);
    _section.appendChild(_code);
    return _section;
  }

  function renderFormattedMessage(message) {
    modalEditorEl.textContent = "";
    extractFormattedSegments(message).forEach(function (segment) {
      if (segment.kind === "text") {
        var textEl = document.createElement("span");
        textEl.className = "formatted-text";
        textEl.textContent = segment.text;
        modalEditorEl.appendChild(textEl);
        return;
      }
      modalEditorEl.appendChild(createJsonSection(segment.value, 0, false));
    });
  }

  function openFormatMessage(message, row) {
    state.modalOpen = true;
    state.modalPreviousFocus =
      state.contextMenu.previousFocus || row.querySelector(".message-cell");
    closeContextMenu(false);
    renderFormattedMessage(message);
    appEl.setAttribute("inert", "");
    appEl.setAttribute("aria-hidden", "true");
    document.body.classList.add("modal-open");
    modalBackdropEl.hidden = false;
    modalBackdropEl.setAttribute("aria-hidden", "false");
    modalCloseEl.focus({ preventScroll: true });
  }

  function closeFormatMessage() {
    if (!state.modalOpen) {
      return;
    }
    state.modalOpen = false;
    modalBackdropEl.hidden = true;
    modalBackdropEl.setAttribute("aria-hidden", "true");
    document.body.classList.remove("modal-open");
    appEl.removeAttribute("inert");
    appEl.removeAttribute("aria-hidden");
    modalEditorEl.textContent = "";
    var previousFocus = state.modalPreviousFocus;
    state.modalPreviousFocus = null;
    if (previousFocus && previousFocus.isConnected) {
      previousFocus.focus({ preventScroll: true });
    }
    refreshAll();
  }

  function activateFormatMessage() {
    if (!state.contextMenu) {
      return;
    }
    openFormatMessage(state.contextMenu.message, state.contextMenu.row);
  }

  function activateCopyMessage() {
    if (!state.contextMenu) {
      return;
    }
    copyMessage(state.contextMenu.message);
    closeContextMenu(true);
  }

  function createLogRow(entry, key) {
    var row = document.createElement("tr");

    var emitCell = document.createElement("td");
    emitCell.className = "time-cell";
    emitCell.textContent = formatTimestamp(entry.emit_ts);
    row.appendChild(emitCell);

    var source = normalizedSource(entry.source);
    var sourceCell = document.createElement("td");
    var sourceBadge = document.createElement("span");
    sourceBadge.className = "source-badge " + sourceBadgeClass(source);
    sourceBadge.textContent = sourceInitial(source);
    sourceCell.appendChild(sourceBadge);
    row.appendChild(sourceCell);

    var tagCell = document.createElement("td");
    var badge = document.createElement("span");
    badge.className = "tag-badge " + tagBadgeClass(entry.tag);
    badge.textContent = entry.tag;
    tagCell.appendChild(badge);
    row.appendChild(tagCell);

    var messageCell = document.createElement("td");
    messageCell.className = "message-cell";
    messageCell.textContent = entry.message;
    row.appendChild(messageCell);

    row.addEventListener("contextmenu", function (event) {
      openContextMenu(event, key, row, entry.message);
    });
    return row;
  }

  function renderLogs(messages) {
    var occurrences = new Map();
    var nextRows = new Map();
    messages.forEach(function (entry) {
      var key = logKey(entry, occurrences);
      var row = state.logRows.get(key);
      if (!row) {
        row = createLogRow(entry, key);
      }
      nextRows.set(key, row);
    });

    Array.from(nextRows.values()).forEach(function (row, index) {
      var currentRow = logBodyEl.children[index] || null;
      if (currentRow !== row) {
        logBodyEl.insertBefore(row, currentRow);
      }
    });
    state.logRows.forEach(function (row, key) {
      if (!nextRows.has(key)) {
        row.remove();
      }
    });
    if (state.contextMenu && !nextRows.has(state.contextMenu.key)) {
      closeContextMenu(false);
    }
    state.logRows = nextRows;

    setLogAreaState(messages.length === 0 ? "empty" : "table");
  }

  function buildLogsUrl() {
    if (state.selectedSession === undefined) {
      return null;
    }
    var sessionParam =
      state.selectedSession === null ? "unknown" : state.selectedSession;
    var url = "/api/logs?session_id=" + encodeURIComponent(sessionParam);
    if (state.tag) {
      url += "&tag=" + encodeURIComponent(state.tag);
    }
    if (state.keyword && state.keyword.trim() !== "") {
      url += "&keyword=" + encodeURIComponent(state.keyword.trim());
    }
    return url;
  }

  function loadLogs() {
    if (state.modalOpen) {
      return Promise.resolve();
    }
    var url = buildLogsUrl();
    if (!url) {
      return Promise.resolve();
    }
    var token = ++state.loadToken;
    return fetchJSON(url)
      .then(function (messages) {
        if (state.modalOpen || token !== state.loadToken) {
          return; // a newer request superseded this one
        }
        clearError();
        renderLogs(messages || []);
      })
      .catch(function (error) {
        if (state.modalOpen || token !== state.loadToken) {
          return;
        }
        showError("Failed to load logs: " + error.message);
      });
  }

  function refreshAll() {
    if (state.modalOpen) {
      return Promise.resolve();
    }
    return loadSessions()
      .then(function () {
        return loadLogs();
      })
      .catch(function (error) {
        if (!state.modalOpen) {
          showError("Failed to load sessions: " + error.message);
        }
      });
  }

  var keywordDebounce = null;
  keywordFilterEl.addEventListener("input", function () {
    state.keyword = keywordFilterEl.value;
    if (keywordDebounce) {
      clearTimeout(keywordDebounce);
    }
    keywordDebounce = setTimeout(function () {
      loadLogs();
    }, 250);
  });

  tagFilterEl.addEventListener("change", function () {
    state.tag = tagFilterEl.value;
    loadLogs();
  });

  [
    [copyMessageActionEl, activateCopyMessage],
    [formatMessageActionEl, activateFormatMessage],
  ].forEach(function (action) {
    action[0].addEventListener("click", action[1]);
    action[0].addEventListener("keydown", function (event) {
      if (event.key !== "Enter" && event.key !== " ") {
        return;
      }
      event.preventDefault();
      action[1]();
    });
  });
  modalCloseEl.addEventListener("click", closeFormatMessage);
  modalEl.addEventListener("keydown", function (event) {
    if (event.key !== "Tab") {
      return;
    }
    var focusable = [modalCloseEl, modalEditorEl];
    var currentIndex = focusable.indexOf(document.activeElement);
    if (event.shiftKey && currentIndex <= 0) {
      event.preventDefault();
      modalEditorEl.focus();
    } else if (!event.shiftKey && currentIndex === focusable.length - 1) {
      event.preventDefault();
      modalCloseEl.focus();
    } else if (currentIndex === -1) {
      event.preventDefault();
      modalCloseEl.focus();
    }
  });
  document.addEventListener("pointerdown", function (event) {
    if (state.contextMenu && !contextMenuEl.contains(event.target)) {
      closeContextMenu(false);
    }
  });
  document.addEventListener("keydown", function (event) {
    if (event.key !== "Escape") {
      return;
    }
    if (state.modalOpen) {
      event.preventDefault();
      closeFormatMessage();
    } else if (state.contextMenu) {
      event.preventDefault();
      closeContextMenu(true);
    }
  });
  window.addEventListener(
    "scroll",
    function () {
      closeContextMenu(false);
    },
    true
  );
  window.addEventListener("resize", function () {
    closeContextMenu(false);
  });

  refreshAll();
  setInterval(refreshAll, 2000);
})();
</script>
</body>
</html>
