<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marix Telemetry</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/telemetry.css" />
</head>
<body>
<div id="app">
  <aside id="sessions">
    <div id="session-content">
      <h1>Sessions</h1>
      <ul id="session-list"></ul>
    </div>
  </aside>
  <main id="main">
    <div id="toolbar">
      <select id="tag-filter">
        <option value="">All tags</option>
        <option value="Info">Info</option>
        <option value="Warning">Warning</option>
        <option value="Error">Error</option>
        <option value="Debug">Debug</option>
      </select>
      <input id="keyword-filter" type="text" placeholder="Filter by keyword…" />
    </div>
    <div id="status-banner"></div>
    <div id="log-area">
      <div id="initial-loading">Loading…</div>
      <table id="log-table" hidden>
        <thead>
          <tr>
            <th>Emit</th>
            <th>Source</th>
            <th>Tag</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <div id="empty-state" hidden>No log entries match the current filters.</div>
      <div id="no-sessions-state" hidden>No sessions available.</div>
    </div>
  </main>
</div>
<div id="log-context-menu" role="menu" hidden>
  <button id="copy-message-action" type="button" role="menuitem">Copy</button>
  <button id="format-message-action" type="button" role="menuitem">Format message</button>
</div>
<div id="format-message-backdrop" aria-hidden="true" hidden>
  <section
    id="format-message-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="format-message-title"
  >
    <header id="format-message-header">
      <h2 id="format-message-title"></h2>
      <div id="format-message-actions">
        <button id="format-message-prev" type="button">Prev</button>
        <button id="format-message-next" type="button">Next</button>
        <button id="format-message-close" type="button">Close</button>
      </div>
    </header>
    <div
      id="format-message-editor"
      role="region"
      aria-label="Formatted log message"
      tabindex="0"
    ></div>
  </section>
</div>
<div id="copy-toast" role="status" aria-live="polite">Content Copied</div>
<script type="module" src="/telemetry.js"></script>
</body>
</html>
