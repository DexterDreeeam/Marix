[runtime]
environment = "development"
mode = "network"
marix_path = "C:\\marix"
marix_path_client = "C:\\marix"
marix_path_agent = "."

[client]
core_address = "43.142.167.218:22345"
interactive = true
request_timeout_ms = 30000

[agent]
enabled = true
bind_address = "0.0.0.0:22345"
max_turns = 32

[model]
backend = "deepseek"

[model.deepseek]
endpoint = "https://api.deepseek.com/chat/completions"
model = "deepseek-chat"
api_key = { name = "DEEPSEEK_API_KEY" }

[logging]
directory = "log"
level = "info"
enable_log_info = false
enable_log_warning = false
enable_log_error = false

[credential]
directory = ".credential"
