<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overview</title>
  <script>
    (() => {
      if (window.location.protocol === "file:") return;
      const segments = window.location.pathname.split("/").filter(Boolean);
      const markerIndex = segments.findIndex(segment => ["remote", "local"].includes(segment.toLowerCase()));
      const baseSegments = markerIndex >= 0
        ? segments.slice(0, markerIndex)
        : (segments[segments.length - 1] || "").toLowerCase() === "index.html"
          ? segments.slice(0, -1)
          : segments.length > 1
            ? segments.slice(0, 1)
            : segments;
      const basePath = baseSegments.length > 0 ? `/${baseSegments.join("/")}/` : "/";
      const base = document.createElement("base");
      base.href = basePath;
      document.head.prepend(base);
    })();
  </script>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading-overlay" class="loading-overlay" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <span id="loading-message">Loading overview...</span>
    </div>
    <div id="data-source-dialog" class="data-source-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="data-source-title">
      <div class="data-source-card">
        <h2 id="data-source-title">Choose data source</h2>
        <p id="data-source-intro">Load repository data from GitHub or select a local repository folder.</p>
        <label class="data-source-field" for="data-source-local-path">
          <span id="data-source-local-path-label">Local path for URL</span>
          <input id="data-source-local-path" type="text" autocomplete="off" spellcheck="false" placeholder="{{repo_root}}" />
        </label>
        <div class="data-source-actions">
          <button id="btn-data-source-github" class="data-source-button" type="button">Use GitHub</button>
          <button id="btn-data-source-local" class="data-source-button primary" type="button">Choose local folder</button>
        </div>
        <p id="data-source-error" class="data-source-error"></p>
      </div>
    </div>
    <div id="main">
      <nav id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-toolset" role="toolbar" aria-label="File tools">
            <div class="tool-group tool-group-left">
              <button id="btn-collapse-all" class="tool-btn" type="button" aria-label="Collapse all"><i class="bi bi-arrows-collapse"></i></button>
              <button id="btn-view-whole-file" class="tool-btn" type="button" aria-label="View whole file"><i class="bi bi-file-earmark-text"></i></button>
            </div>
            <div class="tool-group tool-group-right">
              <button id="btn-star-map-view" class="tool-btn" type="button" aria-label="Star Map">
                <svg class="dipper-icon" viewBox="0 0 32 32" aria-hidden="true">
                  <polyline points="5,20 10,14 15,17 20,11 25,8 27,14 22,20" />
                  <circle cx="5" cy="20" r="2.2" />
                  <circle cx="10" cy="14" r="2.2" />
                  <circle cx="15" cy="17" r="2.2" />
                  <circle cx="20" cy="11" r="2.2" />
                  <circle cx="25" cy="8" r="2.2" />
                  <circle cx="27" cy="14" r="2.2" />
                  <circle cx="22" cy="20" r="2.2" />
                </svg>
              </button>
              <button id="btn-language" class="tool-btn" type="button" aria-label="Switch language"><i class="bi bi-translate"></i></button>
              <button id="btn-reset-data-source" class="tool-btn" type="button" aria-label="Reset data source"><i class="bi bi-arrow-repeat"></i></button>
            </div>
          </div>
          <input type="text" id="search-input" placeholder="Search files..." />
        </div>
        <div id="file-tree" class="file-tree"></div>
      </nav>

      <section id="viewer">
        <div id="viewer-header">
          <span id="file-path">Select a file to view</span>
          <span id="file-status" class="file-status"></span>
        </div>
        <div id="viewer-content">
          <div id="welcome" class="welcome">
            <h2>Welcome to {{proj}} Overview</h2>
            <p>Browse repository files from the sidebar.</p>
          </div>
          <div id="markdown-view" class="markdown-view" style="display:none"></div>
          <div id="image-view" class="image-view" style="display:none">
            <img id="image-el" />
          </div>
          <div id="code-view" style="display:none">
            <pre><code id="code-el"></code></pre>
          </div>
          <div id="diff-view" class="diff-view" style="display:none"></div>
          <section id="star-map-workspace" style="display:none">
            <div class="star-map-canvas">
              <div class="star-map-toolset" role="toolbar" aria-label="Star map tools">
                <button id="btn-reset-star-map" class="tool-btn" type="button" aria-label="Reset view"><i class="bi bi-crosshair"></i></button>
              </div>
              <svg id="star-map-svg" viewBox="-900 -600 1800 1200" role="img" aria-label="Module star map">
                <g id="star-map-layer"></g>
              </svg>
              <nav id="star-map-breadcrumb" class="star-map-breadcrumb" aria-label="Star map module path"></nav>
              <div id="star-map-file-list" class="star-map-file-list"></div>
            </div>
            <aside class="star-map-details">
              <div class="module-detail-header">
                <h3 id="module-detail-title">Repository root</h3>
                <span id="module-detail-status" class="module-status unchanged">Unchanged</span>
              </div>
              <div id="module-detail-body" class="module-detail-body"></div>
            </aside>
          </section>
          <div id="code-popover-backdrop" class="code-popover-backdrop" style="display:none"></div>
          <aside id="code-popover" class="code-popover" style="display:none">
            <div class="code-popover-header">
              <strong id="code-popover-title"></strong>
              <button id="btn-close-code-popover" class="tool-btn" type="button" aria-label="Close code"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="code-popover-content" class="code-popover-content"></div>
          </aside>
        </div>
      </section>
    </div>
    <div id="global-tooltip" role="tooltip" style="display:none"></div>
  </div>

  <script src="assets/modules/star-map-layout.js"></script>
  <script src="assets/app-alias.js"></script>
  <script src="assets/app-config.js"></script>
  <script src="assets/app-state.js"></script>
  <script src="assets/app-design-status.js"></script>
  <script src="assets/app-data-source.js"></script>
  <script src="assets/app-local-source.js"></script>
  <script src="assets/app-tree.js"></script>
  <script src="assets/app-code-rendering.js"></script>
  <script src="assets/app-file-view.js"></script>
  <script src="assets/app-module-tree.js"></script>
  <script src="assets/app-star-map-elements.js"></script>
  <script src="assets/app-star-map.js"></script>
  <script src="assets/app-design-panel.js"></script>
  <script src="assets/app-events.js"></script>
</body>
</html>
