name = "marix"

[runtime]
environment = "development"
mode = "network"
marix_path = "."

[client]
interactive = true
request_timeout_ms = 30000

[server]
enabled = true
ip = { name = "SERVER_IP" }
client_port = 22345
host_port = 22346
telemetry_port = 22347
max_turns = 32

[model]
backend = "deepseek"

[model.deepseek]
endpoint = "https://api.deepseek.com/chat/completions"
model = "deepseek-chat"
api_key = { name = "DEEPSEEK_API_KEY" }

[credential]
directory = ".credential"

[tool]
directory = "tool"
