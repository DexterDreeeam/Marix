name = "marix"

[runtime]
environment = "development"
mode = "network"
marix_path = "."

[client]
interactive = true
request_timeout_ms = 30000

[logging]
remote = false

[server]
enabled = true
ip = "{{SERVER_IP}}"
auth_token = "{{SERVER_AUTH_TOKEN}}"
client_port = {{SERVER_PORT_CLIENT}}
host_port = {{SERVER_PORT_HOST}}
telemetry_port = {{SERVER_PORT_TELEMETRY}}
telemetry_http_port = {{SERVER_PORT_TELEMETRY_HTTP}}
max_turns = 32

[model]
backend = "deepseek"

[model.deepseek]
endpoint = "https://api.deepseek.com/chat/completions"
model = "deepseek-chat"
api_key = "{{MODEL_DEEPSEEK_API_KEY}}"

[tool]
directory = "tool"
